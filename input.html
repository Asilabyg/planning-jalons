<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrée des données</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Entrée des données</h1>
    <a href="index.html">⬅ Retour à l'accueil</a>

    <h2>Créer un jalon</h2>

    <div id="addForm">
        <input id="newName" type="text" placeholder="Nom du jalon">
        <input id="newArea" type="text" placeholder="Area Name">

        <select id="newType">
            <option value="">Type...</option>
            <option value="Engineering">Engineering</option>
            <option value="Procurement">Procurement</option>
            <option value="Construction">Construction</option>
            <option value="Commissioning">Commissioning</option>
        </select>

        <input id="newPIC" type="text" placeholder="Person In Charge">

        <input id="newPlanningDate" type="date" placeholder="Planning Date">

        <input id="newPlanning" type="text" placeholder="Planning Name">

        <button onclick="addJalon()">Ajouter le jalon</button>
    </div>

    <table id="jalonsTable">
        <thead>
            <tr>
                <th>Status</th>
                <th>Nom</th>
                <th>Area</th>
                <th>Type</th>
                <th>PIC</th>
                <th>Planning Date</th>
                <th>Forecast</th>
                <th>Planning Name</th>
            </tr>
        </thead>

        <tbody>
            <!-- Généré automatiquement -->
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
